research_question:
  status: approved
  text: Determine, for n >= 2 and 0 <= m <= n, the necessary and sufficient condition
    on (n, m) under which, for every fixed convex body L in K^n, the functional F_{m,L}(K)
    = V(K[n-m], L[m]) / V(K[n-1], L) is Minkowski convex as a function of K.
